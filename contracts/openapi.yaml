openapi: 3.0.3
info:
  title: 浪 LIVE Editor API
  version: 0.5.0
  description: >
    影片高光剪輯「編輯器控制面」API（前後端共用契約）。M1 Project/毫秒版：
    核心實體為 Project、時間一律毫秒（ms）、雙 pipeline（分析組片 + 渲染）。
    App Runner 只負責 HTTP 控制面（驗證 Cognito JWT、Project/Timeline/Render 狀態、
    presigned 上傳/下載），長時間工作交由非同步 Worker。對應 demand.md §四。
servers:
  - url: http://localhost:8080
    description: 本機
  - url: https://{apprunner-id}.us-east-1.awsapprunner.com
    description: AWS dev（App Runner）
paths:
  /health:
    get:
      summary: 健康檢查
      operationId: health
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
                  version: { type: string }

  /projects:
    post:
      summary: 建立 Project，指定目標秒數，回傳 project_id 與配置的 source key
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProjectCreate" }
      responses:
        "201":
          description: 已建立
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProjectCreated" }

  /projects/{id}/upload-session:
    post:
      summary: 產生原始影片 Raw bucket 的 presigned multipart 上傳授權
      description: >
        回傳 multipart upload_id 與各 part 的 presigned URL；瀏覽器直接對 S3 Raw
        bucket 上傳（不經過 API）。狀態 CREATED → UPLOAD_PENDING。
      operationId: createUploadSession
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UploadSessionCreate" }
      responses:
        "201":
          description: 已建立上傳工作階段
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UploadSession" }
        "404": { description: project 不存在 }

  /projects/{id}/upload-session/complete:
    post:
      summary: 完成 S3 multipart 上傳（提交各 part ETag）
      description: >
        瀏覽器把各 part PUT 後收集到的 ETag 回傳，伺服器 CompleteMultipartUpload
        真正生成 source.mp4，並將 Project 推進 UPLOAD_PENDING → UPLOADING；隨後
        S3 事件觸發分析 pipeline。0.3.0 新增，補齊 §五 的上傳完成握手。
      operationId: completeUploadSession
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UploadCompleteRequest" }
      responses:
        "200":
          description: 上傳已完成
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UploadCompleted" }
        "404": { description: project 不存在 }
        "409": { description: multipart 完成失敗 }

  /projects/{id}:
    get:
      summary: 查詢 Project 狀態（前端 2–5 秒輪詢）
      operationId: getProject
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Project" }
        "404": { description: 不存在 }

  /projects/{id}/chat-upload:
    post:
      summary: 產生聊天室 log CSV 的 presigned 單段上傳授權（聊天優先分析輸入）
      description: >
        回傳 chat.csv 的 presigned PUT URL；瀏覽器直接對 S3 Raw bucket 上傳（不經過
        API 資料面）。之後呼叫 /analyze 觸發分析。
      operationId: createChatUpload
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "201":
          description: 已產生上傳授權
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ChatUploadUrl" }
        "404": { description: project 不存在 }

  /projects/{id}/analyze:
    post:
      summary: 觸發聊天優先高光分析（chat.csv → chatlog.v1 → highlights.v1）
      description: >
        MVP inline shim：讀 Raw bucket 的 chat.csv，清理/洗版標記→chatlog.v1（寫 Work
        bucket），把 Project 推進 ANALYZING，跑規則式熱區+情緒偵測 → highlights.v1，
        狀態 → COMPOSING。之後可移入 ai-task lane（Step Functions），演算法不變。
      operationId: analyzeProject
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AnalyzeRequest" }
      responses:
        "202":
          description: 已接受（分析完成，回摘要）
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AnalyzeResult" }
        "404": { description: project 或 chat.csv 不存在 }
        "409": { description: 狀態不允許分析 }
        "422": { description: chat.csv 無法解析出聊天訊息 }

  /projects/{id}/video-timebase:
    put:
      summary: 連結影片時基（設定 video_start_epoch_ms；chat epoch ↔ 影片相對毫秒 換算基準）
      description: >
        擇一提供 video_start_epoch_ms 或 MP4 OBS creation_time（伺服器換算）。設定後
        /analyze 產出的 highlights 才是影片相對毫秒（否則走 -chattime fallback）。
      operationId: setVideoTimebase
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/VideoTimebaseRequest" }
      responses:
        "200":
          description: 已更新 Project
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Project" }
        "404": { description: project 不存在 }
        "422": { description: creation_time 無法解析或未提供任何欄位 }

  /projects/{id}/highlights:
    get:
      summary: 讀取高光候選（highlights.v1 投影）
      operationId: getHighlights
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HighlightList" }
        "404": { description: 不存在 }
        "501": { description: 尚未實作（M2 Analysis Worker） }

  /projects/{id}/highlights/{highlight_id}:
    patch:
      summary: 逐段校正（聊天落後位移 / 排除開場 / 鎖定 / 選取）
      description: >
        correction_offset_ms 把事件窗相對聊天窗平移（往前抓為負），status→shifted；
        exclude=true → status=excluded、selected=false。僅允許在編輯迴圈（COMPOSING/READY_TO_EDIT）。
      operationId: patchHighlight
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: highlight_id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/HighlightPatch" }
      responses:
        "200":
          description: 已更新（回傳校正後 highlight）
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Highlight" }
        "404": { description: project 或 highlight 不存在 }
        "409": { description: 狀態不允許編輯 }
        "422": { description: 校正後不符合 highlights.v1 }

  /projects/{id}/annotations:
    get:
      summary: 讀取結構化標註（annotations.v1 投影；5 維度 + 敘事節拍）
      operationId: getAnnotations
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Annotations" }
        "404": { description: project 不存在，或尚未產生標註（先 POST） }
    post:
      summary: 產生結構化標註（規則式 5 維度 + 敘事節拍 → annotations.v1）
      description: >
        由專案 highlights（+work bucket 的 chatlog）產生 annotations.v1 存 work bucket。
        需已有 highlights（COMPOSING/READY_TO_EDIT）；不改 Project 狀態。
      operationId: generateAnnotations
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: 已產生
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Annotations" }
        "404": { description: project 不存在 }
        "409": { description: 狀態不允許標註，或無 highlights }
    put:
      summary: 儲存人工編輯後的結構化標註
      description: 伺服器蓋 project_id/schema_version、驗證 annotations.v1 後落地 work bucket。
      operationId: putAnnotations
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Annotations" }
      responses:
        "200":
          description: 已儲存
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Annotations" }
        "404": { description: project 不存在 }
        "422": { description: 不符合 annotations.v1 }

  /projects/{id}/refine:
    post:
      summary: AI 精修（階段 5–6）：轉錄定位笑點 offset + Bedrock 敘事填台詞
      description: >
        轉錄影片（Transcribe）→ 依語音情緒峰提議每個高光的校正 offset、並以 Bedrock Nova
        填 annotations 的 description/dimension.text/beat.line。離線走 Stub 罐頭；真值需上 AWS。
        預設只提議 offset（交編輯器 PATCH 確認）；apply_offsets=true 才自動套用。
      operationId: refineProject
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RefineRequest" }
      responses:
        "200":
          description: 已精修（回提議 offset + enriched annotations）
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RefineResult" }
        "404": { description: project 不存在 }
        "409": { description: 狀態不允許精修，或無 highlights }

  /projects/{id}/timeline:
    get:
      summary: 讀取目前（最新版）Timeline（timeline.v1 投影）
      operationId: getTimeline
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Timeline" }
        "404": { description: 不存在 }
        "501": { description: 尚未實作（M2 Composer Worker） }
    put:
      summary: 儲存 Timeline 編輯結果；建立新版本（不覆蓋舊版）
      operationId: updateTimeline
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Timeline" }
      responses:
        "200":
          description: 已建立新版本
          content:
            application/json:
              schema:
                type: object
                required: [timeline_version]
                properties:
                  timeline_version: { type: integer }
        "404": { description: 不存在 }
        "501": { description: 尚未實作（M2） }

  /projects/{id}/compose:
    post:
      summary: 重新執行自動組片（Composer），產生新 Timeline 版本
      operationId: composeTimeline
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ComposeRequest" }
      responses:
        "202":
          description: 已接受（非同步組片）
          content:
            application/json:
              schema:
                type: object
                properties:
                  timeline_version: { type: integer }
        "404": { description: 不存在 }
        "501": { description: 尚未實作（M2 Composer Worker） }

  /projects/{id}/renders:
    post:
      summary: 提交 Render 工作；凍結 timeline_version、建立 render_id
      operationId: createRender
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RenderCreate" }
      responses:
        "202":
          description: 已接受（非同步渲染）
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RenderCreated" }
        "404": { description: 不存在 }
        "501": { description: 尚未實作（M3/M4 Render pipeline） }

  /projects/{id}/artifacts:
    get:
      summary: 列出 project 的所有成品（雙軌分流：每個 route 一份，供使用者自由下載）
      operationId: listArtifacts
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Artifact" }
        "404": { description: 不存在 }

  /renders/{render_id}:
    get:
      summary: 查詢 Render 工作狀態
      operationId: getRender
      parameters:
        - { name: render_id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Render" }
        "404": { description: 不存在 }
        "501": { description: 尚未實作（M3/M4） }

  /artifacts/{artifact_id}/download:
    get:
      summary: 取得最終產物的 Signed Download URL
      operationId: getArtifactDownloadUrl
      parameters:
        - { name: artifact_id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DownloadUrl" }
        "404": { description: 不存在 }
        "501": { description: 尚未實作（M4） }

components:
  securitySchemes:
    # 0.3.0：控制面以 Cognito 使用者池 JWT 授權（API Gateway JWT authorizer）。
    # 前端登入後在 Authorization: Bearer <id/access token> 帶上。
    CognitoJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Amazon Cognito user pool JWT（lang-live-editor-dev）
  schemas:
    ProjectState:
      type: string
      description: Project 狀態機（demand.md §十八）
      enum:
        - CREATED
        - UPLOAD_PENDING
        - UPLOADING
        - ANALYZING
        - COMPOSING
        - READY_TO_EDIT
        - RENDER_REQUESTED
        - RENDERING
        - ARTIFACT_READY
        - FAILED

    RenderState:
      type: string
      description: Render 狀態機（demand.md §十八）
      enum:
        - CREATED
        - PLANNING_SUBTITLES
        - PLANNING_EFFECTS
        - QUEUED
        - RENDERING
        - VALIDATING
        - PUBLISHING
        - SUCCEEDED
        - FAILED

    ProjectCreate:
      type: object
      required: [target_duration_ms]
      properties:
        title: { type: string, example: 我的直播精華 }
        target_duration_ms:
          type: integer
          minimum: 1000
          maximum: 60000
          example: 30000
          description: 最終短片長度（毫秒），上限 60000（60 秒）
        analysis_source:
          type: string
          enum: [transcribe, chat]
          default: transcribe
          description: >
            高光分析來源。transcribe（預設）：影片上傳後 S3 事件自動走 Transcribe→highlights；
            chat：改由聊天室 LOG（POST /analyze）產生高光，Starter 略過自動 Transcribe。

    ProjectCreated:
      type: object
      required: [project_id, status, target_duration_ms, source_key]
      properties:
        project_id: { type: string }
        status: { $ref: "#/components/schemas/ProjectState" }
        target_duration_ms: { type: integer }
        source_key:
          type: string
          description: 已配置的 Raw bucket object key（上傳完成後才會有物件）

    Project:
      type: object
      required: [project_id, status, target_duration_ms]
      properties:
        project_id: { type: string }
        status: { $ref: "#/components/schemas/ProjectState" }
        title: { type: string }
        target_duration_ms: { type: integer }
        analysis_source:
          type: string
          enum: [transcribe, chat]
          description: 高光分析來源（transcribe 預設 / chat 聊天室 LOG）
        source_duration_ms: { type: integer, description: 原始影片長度（毫秒），上傳分析後才有 }
        source_key: { type: string }
        video_start_epoch_ms:
          type: integer
          description: 影片 0:00 對應的 epoch 毫秒（來自 MP4 OBS creation_time）；chat epoch ↔ 影片相對毫秒 換算基準
        latest_timeline_version: { type: integer }
        latest_render_id: { type: string }
        latest_artifact_id: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        error_code: { type: string }
        error_message: { type: string }

    UploadSessionCreate:
      type: object
      required: [filename]
      properties:
        filename: { type: string, example: source.mp4 }
        content_type: { type: string, example: video/mp4 }
        part_count:
          type: integer
          minimum: 1
          default: 1
          description: multipart 分段數（前端依檔案大小決定）；與 size_bytes 擇一提供
        size_bytes: { type: integer, minimum: 0, description: 檔案大小（bytes），供伺服器推算分段數 }

    UploadSession:
      type: object
      required: [upload_id, bucket, key, parts]
      properties:
        upload_id: { type: string, description: S3 multipart upload id }
        bucket: { type: string }
        key: { type: string }
        parts:
          type: array
          items: { $ref: "#/components/schemas/UploadPart" }
        expires_in_sec: { type: integer, example: 900 }

    UploadPart:
      type: object
      required: [part_number, url]
      properties:
        part_number: { type: integer, minimum: 1 }
        url: { type: string, format: uri, description: 該 part 的 presigned PUT URL }

    UploadPartETag:
      type: object
      required: [part_number, etag]
      properties:
        part_number: { type: integer, minimum: 1 }
        etag: { type: string, description: S3 part PUT 回傳的 ETag }

    UploadCompleteRequest:
      type: object
      required: [upload_id, parts]
      properties:
        upload_id: { type: string }
        parts:
          type: array
          items: { $ref: "#/components/schemas/UploadPartETag" }

    UploadCompleted:
      type: object
      required: [project_id, status, key]
      properties:
        project_id: { type: string }
        status: { $ref: "#/components/schemas/ProjectState" }
        key: { type: string }

    Highlight:
      type: object
      required: [highlight_id, start_ms, end_ms, score]
      description: >
        highlights.v1 的 highlight 項投影。聊天優先分析 additive 欄位（signal / status /
        chat_window / correction / emotion / detection / description / provenance）皆為 optional，
        既有 highlight_id/start_ms/end_ms/score 語意不變。
      properties:
        highlight_id: { type: string }
        start_ms: { type: integer, description: 影片相對毫秒（聊天優先流程為修正後事件窗起點） }
        end_ms: { type: integer }
        score: { type: number }
        reason: { type: string }
        transcript: { type: string }
        suggested_title: { type: string }
        source_segment_ids: { type: array, items: { type: string } }
        selected: { type: boolean }
        locked: { type: boolean }
        signal: { type: string, enum: [chat_volume, speech_emotion, fusion] }
        status: { type: string, enum: [candidate, included, excluded, shifted] }
        excluded_reason: { type: string, nullable: true }
        description: { type: string, nullable: true, description: 深層脈絡（此橋段具體在幹嘛） }
        chat_window:
          type: object
          description: 原始聊天熱區偵測窗（影片相對毫秒）；start_ms/end_ms 為修正後事件窗
          properties:
            start_ms: { type: integer }
            end_ms: { type: integer }
        correction:
          type: object
          description: 聊天窗 → 事件窗 的人工/AI 修正（chat lag）
          properties:
            applied: { type: boolean }
            offset_ms: { type: integer, description: 往前抓為負（如 -20000）、延後為正 }
            corrected_by: { type: string, nullable: true }
            corrected_at: { type: string, format: date-time, nullable: true }
            note: { type: string, nullable: true }
        emotion:
          type: object
          description: Level-1 情緒分數與分項拆解
          properties:
            score: { type: number, minimum: 0, maximum: 1 }
            breakdown:
              type: object
              properties:
                keyword: { type: number }
                emoji: { type: number }
                punctuation: { type: number }
                volume: { type: number }
            counts: { type: object, additionalProperties: true }
        detection:
          type: object
          description: chat_volume 偵測數學（mean+1σ 熱區）
          additionalProperties: true
        provenance: { type: object, additionalProperties: true, description: 跨層溯源 }

    HighlightList:
      type: object
      required: [project_id, highlights]
      properties:
        project_id: { type: string }
        source_duration_ms: { type: integer }
        highlights:
          type: array
          items: { $ref: "#/components/schemas/Highlight" }

    ChatUploadUrl:
      type: object
      required: [bucket, key, url, expires_in_sec]
      description: chat.csv 的 presigned 單段 PUT 上傳授權
      properties:
        bucket: { type: string }
        key: { type: string }
        url: { type: string, format: uri }
        expires_in_sec: { type: integer, example: 900 }

    AnalyzeRequest:
      type: object
      description: 觸發聊天優先分析（欄位皆 optional）
      properties:
        chat_key: { type: string, description: 覆寫 chat.csv 的 raw-bucket key（預設用 project 慣例路徑） }
        video_start_epoch_ms:
          type: integer
          description: 影片 0:00 的 epoch 毫秒；未連結影片時可省略，退回聊天相對時間模式
        source_duration_ms: { type: integer, minimum: 0 }
        params: { type: object, additionalProperties: true, description: 偵測參數覆寫 }

    AnalyzeResult:
      type: object
      required: [project_id, status, highlight_count, analysis_version]
      properties:
        project_id: { type: string }
        status: { $ref: "#/components/schemas/ProjectState" }
        highlight_count: { type: integer }
        analysis_version: { type: string, example: highlight-chat-1.0.0 }
        source_duration_ms: { type: integer }

    VideoTimebaseRequest:
      type: object
      description: 連結影片時基（擇一提供 epoch 或 creation_time）
      properties:
        video_start_epoch_ms: { type: integer, minimum: 0, description: 影片 0:00 的 epoch 毫秒 }
        creation_time: { type: string, description: MP4 OBS creation_time（ISO-8601，可含奈秒/時區） }
        source_duration_ms: { type: integer, minimum: 0 }

    HighlightPatch:
      type: object
      description: 編輯器逐段校正（欄位皆 optional）
      properties:
        correction_offset_ms:
          type: integer
          description: 事件窗相對目前窗的位移；往前抓為負（如 -20000）、延後為正。累加進 correction.offset_ms
        exclude: { type: boolean, description: true=排除此段、false=取消排除 }
        selected: { type: boolean }
        locked: { type: boolean }
        note: { type: string, description: 校正備註 / 排除原因 }

    Annotations:
      type: object
      required: [project_id, annotations]
      description: annotations.v1 投影（5 維度標註 + 敘事節拍，以 highlight_id 關聯）
      properties:
        project_id: { type: string }
        annotation_version: { type: string, nullable: true }
        annotations:
          type: array
          items: { $ref: "#/components/schemas/Annotation" }

    Annotation:
      type: object
      required: [highlight_id, dimensions]
      properties:
        highlight_id: { type: string }
        title: { type: string, nullable: true }
        description: { type: string, nullable: true }
        dimensions:
          type: array
          items: { $ref: "#/components/schemas/DimensionSpan" }
        beats:
          type: array
          items: { $ref: "#/components/schemas/Beat" }
        corrected_by: { type: string, nullable: true }
        corrected_at: { type: string, format: date-time, nullable: true }

    DimensionSpan:
      type: object
      required: [dimension, start_ms, end_ms]
      properties:
        dimension:
          type: string
          enum: [setup, reaction_start, reaction_turn, punchline, chat_highlights]
          description: 埋梗=setup / 反應-一開始=reaction_start / 反應-轉折=reaction_turn / 笑點爆點=punchline / 聊天室精彩留言=chat_highlights
        start_ms: { type: integer, description: 絕對影片相對毫秒 }
        end_ms: { type: integer }
        text: { type: string, nullable: true }
        messages:
          type: array
          description: chat_highlights 維度：挑選的聊天室精彩留言
          items:
            type: object
            required: [text]
            properties:
              message_id: { type: string, nullable: true }
              username: { type: string, nullable: true }
              text: { type: string }

    Beat:
      type: object
      required: [order, start_ms, end_ms]
      properties:
        order: { type: integer, minimum: 1 }
        beat:
          type: string
          nullable: true
          enum: [setup, reaction_start, reaction_turn, punchline]
        line: { type: string, nullable: true, description: 台詞 }
        start_ms: { type: integer }
        end_ms: { type: integer }
        duration_ms: { type: integer, nullable: true }

    RefineRequest:
      type: object
      description: AI 精修請求（欄位皆 optional）
      properties:
        apply_offsets: { type: boolean, default: false, description: true=直接套用提議 offset；false=只提議 }
        params: { type: object, additionalProperties: true, description: 精修參數覆寫（lead_ms 等） }

    ProposedOffset:
      type: object
      required: [highlight_id, current_start_ms, proposed_start_ms, offset_ms]
      description: AI 逐字稿定位笑點的校正提議
      properties:
        highlight_id: { type: string }
        current_start_ms: { type: integer }
        proposed_start_ms: { type: integer }
        offset_ms: { type: integer, description: 往前抓為負、延後為正 }
        evidence_text: { type: string, nullable: true, description: 笑點段落台詞 }

    RefineResult:
      type: object
      required: [project_id, annotations, transcript_segment_count]
      properties:
        project_id: { type: string }
        proposed_offsets:
          type: array
          items: { $ref: "#/components/schemas/ProposedOffset" }
        annotations: { $ref: "#/components/schemas/Annotations" }
        transcript_segment_count: { type: integer }
        applied: { type: integer, description: 已自動套用的 offset 數 }

    TimelineClip:
      type: object
      required: [timeline_order, highlight_id, source_start_ms, source_end_ms, timeline_start_ms, timeline_end_ms]
      properties:
        timeline_order: { type: integer }
        highlight_id: { type: string }
        source_start_ms: { type: integer }
        source_end_ms: { type: integer }
        timeline_start_ms: { type: integer }
        timeline_end_ms: { type: integer }

    Timeline:
      type: object
      required: [project_id, version, target_duration_ms, actual_duration_ms, clips]
      description: timeline.v1 投影；PUT 時作為請求體（伺服器建立新版本）
      properties:
        schema_version: { type: string, example: timeline.v1 }
        project_id: { type: string }
        version: { type: integer }
        target_duration_ms: { type: integer }
        actual_duration_ms: { type: integer }
        aspect_ratio: { type: string, enum: ["16:9", "9:16", "1:1"] }
        subtitle_settings: { type: object, additionalProperties: true }
        effect_settings: { type: object, additionalProperties: true }
        clips:
          type: array
          items: { $ref: "#/components/schemas/TimelineClip" }

    ComposeRequest:
      type: object
      properties:
        target_duration_ms: { type: integer, description: 覆寫目標長度；省略則沿用 Project 設定 }
        locked_highlight_ids: { type: array, items: { type: string } }
        excluded_highlight_ids: { type: array, items: { type: string } }

    RenderCreate:
      type: object
      description: 提交 Render；預設使用最新 timeline 版本
      properties:
        timeline_version: { type: integer, description: 省略則使用 latest_timeline_version }
        route:
          type: string
          enum: [pipeline, agent]
          description: 創意路線（省略＝pipeline）。雙軌分流由 compose 後自動各建一個 route 的 render。

    RenderCreated:
      type: object
      required: [render_id, status]
      properties:
        render_id: { type: string }
        status: { $ref: "#/components/schemas/RenderState" }

    Render:
      type: object
      required: [render_id, project_id, status, timeline_version]
      properties:
        render_id: { type: string }
        project_id: { type: string }
        status: { $ref: "#/components/schemas/RenderState" }
        route: { type: string, enum: [pipeline, agent], description: 創意路線（省略＝pipeline） }
        current_stage: { type: string }
        timeline_version: { type: integer }
        effect_seed: { type: integer }
        batch_job_id: { type: string }
        artifact_id: { type: string }
        error_code: { type: string }
        error_message: { type: string }
        created_at: { type: string, format: date-time }
        started_at: { type: string, format: date-time }
        completed_at: { type: string, format: date-time }

    Artifact:
      type: object
      required: [artifact_id, project_id, render_id, status, files]
      description: artifact.v1 投影
      properties:
        artifact_id: { type: string }
        project_id: { type: string }
        render_id: { type: string }
        route: { type: string, enum: [pipeline, agent], description: 產出此成品的創意路線（省略＝pipeline） }
        timeline_version: { type: integer }
        status: { type: string, enum: [READY, FAILED] }
        duration_ms: { type: integer }
        aspect_ratio: { type: string, enum: ["16:9", "9:16", "1:1"] }
        resolution:
          type: object
          properties:
            width: { type: integer }
            height: { type: integer }
        size_bytes: { type: integer }
        files:
          type: object
          properties:
            video_key: { type: string }
            preview_key: { type: string }
            thumbnail_key: { type: string }
            subtitle_key: { type: string }
            manifest_key: { type: string }
        created_at: { type: string, format: date-time }

    DownloadUrl:
      type: object
      required: [url, expires_in_sec]
      properties:
        url: { type: string, format: uri }
        expires_in_sec: { type: integer, example: 900 }
